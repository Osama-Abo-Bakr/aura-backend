name: Aura Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write   # required for SARIF uploads
  actions: read

# ---------------------------------------------------------------------------
# Cancel in-flight runs on the same branch/PR to save minutes
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: aura-backend

jobs:
  # =========================================================================
  # 1. CODE QUALITY — lint, format, type-check (fast, no services needed)
  # =========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy types-stripe

      - name: Ruff lint
        run: ruff check app/ --select E,F,W,I,UP,B,SIM --ignore E501,B008,B904,UP035

      - name: Ruff format check
        run: ruff format --check app/

      - name: mypy type-check
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # advisory until stubs are complete

  # =========================================================================
  # 2. SECURITY — SAST, dependency audit, secret scanning, container scan
  # =========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for secret scanning

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ── Bandit: SAST for Python ──────────────────────────────────────────
      - name: Install security tools
        run: pip install bandit[toml] pip-audit

      - name: Bandit SAST scan
        run: |
          bandit -r app/ -f json -o bandit-results.json || true

      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-results
          path: bandit-results.json
          retention-days: 30

      # ── pip-audit: dependency vulnerability audit ────────────────────────
      - name: pip-audit dependency scan
        run: |
          pip install -r requirements.txt
          pip-audit -r requirements.txt --desc 2>&1 | tee pip-audit-results.txt || true

      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-results
          path: pip-audit-results.txt
          retention-days: 30

      # ── Gitleaks: secret detection ──────────────────────────────────────
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # 3. TEST — pytest with coverage (needs Redis service)
  # =========================================================================
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET_TEST || 'test-secret-at-least-32-chars-long-ok' }}
          GEMINI_API_KEY: test-gemini-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          STRIPE_PRICE_ID_PREMIUM: price_placeholder
          REDIS_URL: redis://localhost:6379
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=50

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # =========================================================================
  # 4. DOCKER — build + Trivy container scan
  # =========================================================================
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy: container vulnerability scanner ───────────────────────────
      - name: Trivy container scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:ci
          format: sarif
          output: trivy-container-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0  # don't fail the build on found vulns (report only)

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-container-results.sarif
          category: trivy-container

      - name: Trivy container scan (table for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:ci
          format: table
          severity: CRITICAL,HIGH

      # ── Trivy: filesystem scan for misconfigurations ─────────────────────
      - name: Trivy filesystem config scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy FS SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      # ── Docker image summary ─────────────────────────────────────────────
      - name: Docker image summary
        run: |
          docker images ${{ env.DOCKER_IMAGE }}:ci --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # =========================================================================
  # 5. DEPLOY — only on main branch, gated on all checks passing
  # =========================================================================
  deploy:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deployment gate passed
        run: |
          echo "All CI/CD checks passed."
          echo "Image: ${{ env.DOCKER_IMAGE }}:ci"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Add your deployment step here (e.g., Railway, AWS, GCP)."